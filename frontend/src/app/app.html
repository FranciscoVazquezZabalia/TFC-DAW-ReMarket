<style>
  :root {
    --apple-bg: #fbfbfd;
    --apple-dark: #1d1d1f;
  }
  
  body { 
    background-color: var(--apple-bg); 
    color: var(--apple-dark);
    font-family: -apple-system, system-ui, sans-serif;
  }

  .nav-apple {
    background-color: rgba(251, 251, 253, 0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: 20px 0; 
    border-bottom: 1px solid rgba(0, 0, 0, 0.06); 
  }

  .nav-link-auth {
    color: var(--apple-dark);
    font-size: 14px;
    text-decoration: none;
    font-weight: 500;
  }

  .hero-title {
    font-size: clamp(80px, 11vw, 160px); 
    font-weight: 700;
    letter-spacing: -0.05em; 
    line-height: 0.95;
  }

  .showcase-block {
    height: 80vh; 
    border-radius: 32px; 
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 60px;
    transition: transform 0.5s ease;
  }
  
  .showcase-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 40%);
    z-index: 1;
  }

  .showcase-content {
    z-index: 2;
    text-align: center;
  }

  .showcase-title {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
</style>

<nav class="navbar navbar-expand navbar-light nav-apple sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-5 tracking-tight text-dark" href="#">REMARKET</a>
    <div class="ms-auto d-flex align-items-center gap-4">
      <a href="#" class="nav-link-auth">Acceder</a>
      <a href="#" class="btn btn-dark btn-sm rounded-pill px-4 py-2" style="font-size: 13px;">Registrarse</a>
    </div>
  </div>
</nav>

<main>
  <section class="py-5 mt-4 mb-5">
    <div class="container text-center pt-5 pb-3">
      <h1 class="hero-title">Vende lo tuyo.<br><span class="opacity-20">Compra lo suyo.</span></h1>
    </div>
  </section>

  <section class="container px-4 pb-5">
    <div class="row g-4">
      <div class="col-12" *ngFor="let section of showcaseSections">
        <div class="showcase-block shadow-sm" [ngStyle]="{'background-image': 'url(' + section.img + ')'}">
          <div class="showcase-content {{section.textColor}}">
            <h2 class="showcase-title">{{section.title}}</h2>
            <p class="fs-4">{{section.subtitle}}</p>
          </div>
        </div>
      </div>
    </div>
  </section>
  
  <section class="py-5 text-center my-5">
    <h2 class="display-5 fw-bold mb-4">¿Listo para entrar?</h2>
    <button class="btn btn-dark rounded-pill px-5 py-3 fs-5 fw-medium">Crear cuenta gratis</button>
  </section>
</main>
