<div class="register-wrapper">
  <div class="register-card text-center">
    
    <a routerLink="/" class="text-decoration-none text-dark d-inline-block mb-4">
       <h2 class="fw-bold tracking-tight fs-4">RE<span class="opacity-50">MARKET</span></h2>
    </a>
    
    <h1 class="h3 fw-bold mb-2">Crear cuenta</h1>
    <p class="text-secondary small mb-4">Únete a la plataforma y empieza a vender hoy mismo.</p>
    
    <form>

      <div class="mb-3">
        <input type="text" class="form-control input-apple w-100 mb-2" placeholder="Nombre completo">
        <input type="email" class="form-control input-apple w-100" placeholder="Correo electrónico">
      </div>
      
      <div class="mb-4">
        <input type="password" class="form-control input-apple w-100 mb-2" placeholder="Contraseña">
        <input type="password" class="form-control input-apple w-100" placeholder="Repite la contraseña">
      </div>
      
      <button type="button" class="btn-apple-dark mb-4">Registrarse</button>
    </form>
    
    <p class="text-secondary small mb-0">
      ¿Ya tienes cuenta? <a routerLink="/login" class="text-primary text-decoration-none fw-medium">Inicia sesión</a>
    </p>
    
  </div>
</div>
