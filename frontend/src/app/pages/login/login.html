<div class="login-wrapper">
  <div class="login-card text-center">
    
    <a routerLink="/" class="text-decoration-none text-dark d-inline-block mb-4">
       <h2 class="fw-bold tracking-tight fs-4">RE<span class="opacity-50">MARKET</span></h2>
    </a>
    
    <h1 class="h3 fw-bold mb-2">Iniciar sesión</h1>
    <p class="text-secondary small mb-4">Introduce tus credenciales para acceder al catálogo.</p>
    
    <form>
      <div class="mb-3">
        <input type="email" class="form-control input-apple w-100" placeholder="Correo electrónico">
      </div>
      <div class="mb-4 text-end">
        <input type="password" class="form-control input-apple w-100 mb-2" placeholder="Contraseña">
        <a href="#" class="text-primary text-decoration-none small">¿Has olvidado tu contraseña?</a>
      </div>
      
      <button type="button" class="btn-apple-dark mb-4">Continuar</button>
    </form>
    
    <p class="text-secondary small mb-0">
      ¿No tienes cuenta? <a routerLink="/register" class="text-primary text-decoration-none fw-medium">Regístrate gratis</a>
    </p>
    
  </div>
</div>
