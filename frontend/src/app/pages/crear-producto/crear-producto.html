<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

      <div class="card border-0 shadow-sm rounded-4 p-4">

        <h2 class="fw-bold mb-1">Publicar producto</h2>
        <p class="text-secondary small mb-4">Rellena los detalles del artículo que quieres vender.</p>

        @if (errorMsg) {
          <div class="alert alert-danger small py-2 mb-3">{{ errorMsg }}</div>
        }

        <form (ngSubmit)="onSubmit()">

          <div class="mb-3">
            <label class="form-label fw-medium small">Título</label>
            <input type="text" class="form-control rounded-3" placeholder="Ej: iPhone 14 Pro"
                   [(ngModel)]="producto.titulo" name="titulo" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium small">Descripción</label>
            <textarea class="form-control rounded-3" rows="3" placeholder="Describe el artículo..."
                      [(ngModel)]="producto.descripcion" name="descripcion" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium small">Precio (€)</label>
            <input type="number" class="form-control rounded-3" placeholder="0"
                   [(ngModel)]="producto.precio" name="precio" required min="0">
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium small">Estado del artículo</label>
            <select class="form-select rounded-3" [(ngModel)]="producto.estado" name="estado" required>
              <option value="" disabled>Selecciona el estado</option>
              <option value="Nuevo">Nuevo</option>
              <option value="Como nuevo">Como nuevo</option>
              <option value="Buen estado">Buen estado</option>
              <option value="Usado">Usado</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium small">URL de imagen</label>
            <input type="url" class="form-control rounded-3" placeholder="https://ejemplo.com/imagen.jpg"
                   [(ngModel)]="producto.imagenUrl" name="imagenUrl">
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium small">Categoría</label>
            <select class="form-select rounded-3" [(ngModel)]="producto.categoriaId" name="categoriaId">
              <option [ngValue]="null">Sin categoría</option>
              @for (cat of categorias; track cat.id) {
                <option [ngValue]="cat.id">{{ cat.nombre }}</option>
              }
            </select>
          </div>

          <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 fw-medium" [disabled]="enviando">
            {{ enviando ? 'Publicando...' : 'Publicar' }}
          </button>

        </form>

        <div class="text-center mt-3">
          <a routerLink="/catalog" class="text-secondary small text-decoration-none">Cancelar y volver al catálogo</a>
        </div>

      </div>
    </div>
  </div>
</div>
