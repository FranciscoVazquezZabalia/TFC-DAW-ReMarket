<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold">Explorar productos</h2>
    <div class="d-flex gap-2">
      <input type="text" class="form-control rounded-pill border-0 bg-light px-4" placeholder="Buscar algo...">
      <button class="btn btn-dark rounded-pill px-4">Filtros</button>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let p of products">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100">
        <img [src]="p.img" class="card-img-top" style="height: 250px; object-fit: cover;">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title fw-bold mb-0">{{p.title}}</h5>
            <span class="badge bg-light text-dark rounded-pill">{{p.category}}</span>
          </div>
          <p class="text-secondary small mb-3">Estado: {{p.state}}</p>
          <div class="d-flex justify-content-between align-items-center mt-auto">
            <h4 class="fw-bold mb-0 text-primary">{{p.price}}€</h4>
            <button class="btn btn-outline-dark btn-sm rounded-pill px-3">Ver detalle</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
