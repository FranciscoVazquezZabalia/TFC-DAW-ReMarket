<!-- Header con Perfil -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold tracking-tight" routerLink="/">RE<span class="opacity-50">MARKET</span></a>
    
    <div class="ms-auto d-flex align-items-center">
      <a routerLink="/profile" class="text-decoration-none d-flex align-items-center gap-2">
        <span class="text-dark small fw-medium d-none d-sm-block">Mi Perfil</span>
        <div class="rounded-circle bg-light d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; border: 1px solid #eee;">
          <i class="bi bi-person text-secondary"></i> 
          <span class="text-secondary" style="font-size: 10px;">PFP</span>
        </div>
      </a>
    </div>
  </div>
</nav>

<!-- Carrusel de productos destacados -->
<div id="heroCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
  <div class="carousel-inner rounded-4 mt-4 container">
    <div class="carousel-item active" *ngFor="let img of featuredImages; let i = index" [class.active]="i === 0">
      <img [src]="img" class="d-block w-100" style="height: 400px; object-fit: cover; border-radius: 20px;">
      <div class="carousel-caption d-none d-md-block text-start" style="left: 10%; bottom: 20%;">
        <h2 class="display-5 fw-bold text-white shadow-sm">Novedades de la semana</h2>
        <p class="fs-5">Descubre los productos más buscados.</p>
      </div>
    </div>
  </div>
</div>

<!-- Grid de Productos -->
<div class="container pb-5">
  <div class="row mb-4 align-items-center">
    <div class="col-md-6">
      <h3 class="fw-bold m-0">Catálogo</h3>
    </div>
    <div class="col-md-6">
      <div class="d-flex gap-2 justify-content-md-end mt-3 mt-md-0">
        <input type="text" class="form-control rounded-pill border-0 bg-light px-4" placeholder="Buscar productos...">
        <button class="btn btn-dark rounded-pill px-4">Filtrar</button>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-6 col-md-4 col-lg-3" *ngFor="let p of products">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 product-card">
        <img [src]="p.img" class="card-img-top" style="height: 200px; object-fit: cover;">
        <div class="card-body p-3">
          <span class="text-uppercase text-secondary" style="font-size: 10px; letter-spacing: 1px;">{{p.category}}</span>
          <h6 class="card-title fw-bold text-truncate mb-1">{{p.title}}</h6>
          <p class="text-muted small mb-2">{{p.state}}</p>
          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5">{{p.price}}€</span>
            <button class="btn btn-sm btn-outline-dark rounded-pill" [routerLink]="['/product', p.id_producto]">ver</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
