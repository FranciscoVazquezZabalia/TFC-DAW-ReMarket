#1- Configuración del puerto del servidor.
server.port=8080

#2- Conexión a la base de datos MySQL.
spring.datasource.url=jdbc:mysql://localhost:8889/remarket_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#3- Configuración de JPA / Hibernate. Esta línea hará que Java cree las tablas automáticammente basándose en las clases necesarias.
spring.jpa.hibernate.ddl-auto=update

# Esto mostrara en la terminal las consultas SQL que haga Java.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect